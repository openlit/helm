{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "openlit-controller.fullname" . }}
  labels:
    {{- include "openlit-controller.labels" . | nindent 4 }}
rules:
  # Discovery + naked-pod Agent Observability (create/delete for pod restart).
  # Matches docs/latest/controller/configuration.mdx and examples/kubernetes/controller.yaml.
  - apiGroups: [""]
    resources: ["pods", "pods/log", "nodes", "namespaces", "services", "replicationcontrollers"]
    verbs: ["get", "list", "watch", "create", "delete"]
  # SDK injection patches Deployments / DaemonSets / StatefulSets / ReplicaSets.
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch", "update", "patch"]
{{- end }}
