apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "openlit-controller.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openlit-controller.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "openlit-controller.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "openlit-controller.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "openlit-controller.serviceAccountName" . }}
      hostPID: true
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: controller
          image: {{ include "openlit-controller.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["--config", "/etc/openlit-controller/config.yaml"]
          env:
            - name: OPENLIT_PROC_ROOT
              value: "/host/proc"
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- if .Values.config.apiKey }}
            - name: OPENLIT_API_KEY
              value: {{ .Values.config.apiKey | quote }}
            {{- end }}
          securityContext:
            privileged: true
          volumeMounts:
            - name: proc
              mountPath: /host/proc
              readOnly: true
            - name: sys-kernel-debug
              mountPath: /sys/kernel/debug
              readOnly: true
            - name: bpf
              mountPath: /sys/fs/bpf
            - name: config
              mountPath: /etc/openlit-controller
              readOnly: true
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: proc
          hostPath:
            path: /proc
        - name: sys-kernel-debug
          hostPath:
            path: /sys/kernel/debug
        - name: bpf
          hostPath:
            path: /sys/fs/bpf
        - name: config
          configMap:
            name: {{ include "openlit-controller.fullname" . }}-config
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
