# OpenLIT Controller - Zero-code LLM and Agent observability
# https://docs.openlit.io/latest/controller/overview

# Number of pods is not configurable — the controller runs as a DaemonSet (one per node).

# Container image
image:
  repository: ghcr.io/openlit/openlit-controller
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Controller configuration
# When deployed as a subchart of the openlit chart, openlitUrl and otlpEndpoint
# are auto-derived from the parent release name. Override only when using an
# external OpenLIT instance or deploying the controller standalone.
config:
  # Full URL of the OpenLIT dashboard.  Highest priority override — when set,
  # openlitServiceName and openlitNamespace are ignored for this field.
  # Example: "http://openlit.monitoring.svc.cluster.local:3000"
  openlitUrl: ""
  # Full OTLP HTTP endpoint.  Same override semantics as openlitUrl.
  # Example: "http://openlit.monitoring.svc.cluster.local:4318"
  otlpEndpoint: ""

  # --- Standalone deployment helpers ---
  # When deploying the controller chart on its own (not as a subchart of
  # openlit), set openlitServiceName to the Kubernetes Service name of your
  # existing OpenLIT deployment.  Optionally set openlitNamespace if OpenLIT
  # is in a different namespace.
  #
  # Examples (standalone in same namespace):
  #   config.openlitServiceName: openlit
  #
  # Examples (standalone, cross-namespace):
  #   config.openlitServiceName: openlit
  #   config.openlitNamespace: monitoring
  #
  # When deployed as a subchart of the openlit chart, leave both empty —
  # the service name is auto-derived from the release.
  openlitServiceName: ""
  openlitNamespace: ""
  # How often the controller polls the dashboard
  pollInterval: "60s"
  # Deployment environment label
  environment: "production"
  # Cluster identifier for multi-cluster setups
  clusterId: "default"
  # API key for authenticating with the dashboard (optional)
  apiKey: ""
  # Override the controller's instance identity (optional).
  # By default, the controller uses NODE_NAME (Kubernetes downward API).
  # Set this for custom identity in multi-cluster or advanced setups.
  instanceId: ""

# ServiceAccount configuration
serviceAccount:
  create: true
  name: ""
  annotations: {}

# RBAC configuration
rbac:
  create: true

# Pod resource limits
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Tolerations — defaults allow scheduling on all nodes (including masters)
tolerations:
  - effect: NoSchedule
    operator: Exists
  - effect: NoExecute
    operator: Exists

# Node selector for restricting which nodes run the controller
nodeSelector: {}

# Pod affinity rules
affinity: {}

# Additional labels to add to all resources
additionalLabels: {}

# Annotations to add to controller pods
podAnnotations: {}
