{{- if .Values.clickhouse.enabled }}
{{- if or .Values.clickhouse.config.enabled .Values.clickhouse.initDatabase }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-db-config
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}-db
    {{- include "openlit.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
data:
  {{- if .Values.clickhouse.config.enabled }}
  custom-config.xml: |
    <?xml version="1.0"?>
    <clickhouse>
        <logger>
            <level>warning</level>
            <console>true</console>
        </logger>
        <trace_log>
            <level>6</level>
            <flush_interval_milliseconds>120000</flush_interval_milliseconds>
            <table_ttl>604800</table_ttl>
        </trace_log>
        <text_log>
            <level>warning</level>
            <table_ttl>604800</table_ttl>
            <flush_interval_milliseconds>120000</flush_interval_milliseconds>
        </text_log>
        <query_log>
            <log_queries_min_query_duration_ms>1000</log_queries_min_query_duration_ms>
            <flush_interval_milliseconds>60000</flush_interval_milliseconds>
            <table_ttl>604800</table_ttl>
        </query_log>
        <system_log>
            <level>warning</level>
        </system_log>
        <metric_log>
            <collect_interval_milliseconds>60000</collect_interval_milliseconds>
            <flush_interval_milliseconds>120000</flush_interval_milliseconds>
            <table_ttl>604800</table_ttl>
        </metric_log>
        <asynchronous_metric_log>
            <collect_interval_milliseconds>60000</collect_interval_milliseconds>
            <flush_interval_milliseconds>120000</flush_interval_milliseconds>
            <table_ttl>604800</table_ttl>
        </asynchronous_metric_log>
        <part_log>
            <level>warning</level>
            <flush_interval_milliseconds>120000</flush_interval_milliseconds>
            <table_ttl>604800</table_ttl>
        </part_log>
        <latency_log>
            <flush_interval_milliseconds>120000</flush_interval_milliseconds>
            <table_ttl>604800</table_ttl>
        </latency_log>
    </clickhouse>
  {{- end }}
  {{- if .Values.clickhouse.initDatabase }}
  init-database.sh: |
    #!/bin/bash
    set -e
    echo "Creating ClickHouse database ${CLICKHOUSE_DATABASE} if needed..."
    clickhouse-client --query "CREATE DATABASE IF NOT EXISTS ${CLICKHOUSE_DATABASE}"
    echo "Database ${CLICKHOUSE_DATABASE} is ready."
  {{- end }}
---
{{- end }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app: {{ .Release.Name }}-db
    {{- include "openlit.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
  name: {{ .Release.Name }}-db
  namespace: {{ .Release.Namespace }}
spec:
  serviceName: {{.Release.Name }}-db
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-db
      {{- include "openlit.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: database
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-db
        {{- include "openlit.labels" . | nindent 8 }}
        app.kubernetes.io/component: database
    spec:
      terminationGracePeriodSeconds: 10
      securityContext:
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
      containers:
      - name: clickhouse
        image: "{{ .Values.clickhouse.image.repository }}:{{ .Values.clickhouse.image.tag }}"
        imagePullPolicy: {{ .Values.clickhouse.image.pullPolicy }}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          readOnlyRootFilesystem: false
        ports:
        - containerPort: 9000
        - containerPort: 8123
        env:
        {{- if .Values.clickhouse.auth.secret.name }}
        - name: CLICKHOUSE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.clickhouse.auth.secret.name }}
              key: {{ default "OPENLIT" .Values.clickhouse.auth.secret.passwordKey }}
        - name: CLICKHOUSE_USER
          valueFrom:
            secretKeyRef:
              name: {{ .Values.clickhouse.auth.secret.name }}
              key: {{ default "default" .Values.clickhouse.auth.secret.usernameKey }}
        {{- else }}
        - name: CLICKHOUSE_PASSWORD
          value: {{ .Values.clickhouse.auth.password | quote }}
        - name: CLICKHOUSE_USER
          value: {{ .Values.clickhouse.auth.user | quote }}
        {{- end }}
        - name: CLICKHOUSE_DATABASE
          value: {{ default .Values.config.database.name .Values.clickhouse.database | quote }}
        {{- if .Values.clickhouse.initDatabase }}
        - name: CLICKHOUSE_ALWAYS_RUN_INITDB_SCRIPTS
          value: "true"
        {{- end }}
        livenessProbe:
          httpGet:
            path: /ping
            port: 8123
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ping
            port: 8123
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          {{- toYaml .Values.clickhouse.resources | nindent 12 }}
        volumeMounts:
        - name: {{ .Release.Name }}-db-storage
          mountPath: /var/lib/clickhouse
        {{- if .Values.clickhouse.config.enabled }}
        - name: clickhouse-config
          mountPath: /etc/clickhouse-server/config.d/custom-config.xml
          subPath: custom-config.xml
          readOnly: true
        {{- end }}
        {{- if .Values.clickhouse.initDatabase }}
        - name: clickhouse-config
          mountPath: /docker-entrypoint-initdb.d/init-database.sh
          subPath: init-database.sh
          readOnly: true
        {{- end }}
      {{- if or .Values.clickhouse.config.enabled .Values.clickhouse.initDatabase }}
      volumes:
      - name: clickhouse-config
        configMap:
          name: {{ .Release.Name }}-db-config
          defaultMode: 0755
      {{- end }}
  volumeClaimTemplates:
  - metadata:
      name: {{ .Release.Name }}-db-storage
    spec:
      accessModes: [ "{{ .Values.clickhouse.persistence.accessMode }}" ]
      resources:
        requests:
          storage: {{ .Values.clickhouse.persistence.size }}
      {{- with .Values.clickhouse.persistence.storageClassName }}
      storageClassName: {{ . }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: {{ .Release.Name }}-db
    {{- include "openlit.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
  name: {{ .Release.Name }}-db
spec:
  ports:
  - port: 9000
    targetPort: 9000
    name: clickhouse
  - port: 8123
    targetPort: 8123
    name: http
  type: {{ .Values.clickhouse.service.type }}
  selector:
    app: {{ .Release.Name }}-db
    {{- include "openlit.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: database
{{- end }}
